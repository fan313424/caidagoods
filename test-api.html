<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车API测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f6f8;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #b71c1c;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 8px;
        }
        
        .test-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        button {
            padding: 12px 24px;
            background: #b71c1c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #991616;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "Courier New", monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .success {
            border-left: 4px solid #4caf50;
        }
        
        .error {
            border-left: 4px solid #f44336;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 购物车API测试工具</h1>
        
        <!-- 添加商品到购物车 -->
        <div class="test-section">
            <h2>1. 添加商品到购物车</h2>
            <div class="grid">
                <div class="form-group">
                    <label>用户ID:</label>
                    <input type="number" id="addUserId" value="1">
                </div>
                <div class="form-group">
                    <label>商品ID:</label>
                    <select id="addProductId">
                        <option value="1">潮色指甲油 (￥299)</option>
                        <option value="2">高性能轻薄本 (￥6900)</option>
                        <option value="3">日用个护好物 (￥99)</option>
                        <option value="4">高清办公本 (￥5999)</option>
                        <option value="5">出行搭配包 (￥999)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>数量:</label>
                    <input type="number" id="addQuantity" value="1" min="1">
                </div>
            </div>
            <button onclick="addToCart()">添加到购物车</button>
            <div id="addResult" class="result"></div>
        </div>
        
        <!-- 获取购物车列表 -->
        <div class="test-section">
            <h2>2. 获取购物车列表</h2>
            <div class="form-group">
                <label>用户ID:</label>
                <input type="number" id="getUserId" value="1">
            </div>
            <button onclick="getCartItems()">获取购物车</button>
            <div id="getResult" class="result"></div>
        </div>
        
        <!-- 更新商品数量 -->
        <div class="test-section">
            <h2>3. 更新商品数量</h2>
            <div class="grid">
                <div class="form-group">
                    <label>购物车项ID:</label>
                    <input type="number" id="updateCartId" placeholder="请输入购物车项ID">
                </div>
                <div class="form-group">
                    <label>新数量:</label>
                    <input type="number" id="updateQuantity" value="1" min="1">
                </div>
            </div>
            <button onclick="updateQuantity()">更新数量</button>
            <div id="updateResult" class="result"></div>
        </div>
        
        <!-- 删除购物车商品 -->
        <div class="test-section">
            <h2>4. 删除购物车商品</h2>
            <div class="form-group">
                <label>购物车项ID:</label>
                <input type="number" id="deleteCartId" placeholder="请输入购物车项ID">
            </div>
            <button onclick="removeFromCart()" style="background: #f44336;">删除商品</button>
            <div id="deleteResult" class="result"></div>
        </div>
        
        <!-- 获取购物车数量 -->
        <div class="test-section">
            <h2>5. 获取购物车商品数量</h2>
            <div class="form-group">
                <label>用户ID:</label>
                <input type="number" id="countUserId" value="1">
            </div>
            <button onclick="getCartCount()">获取数量</button>
            <div id="countResult" class="result"></div>
        </div>
    </div>
    
    <script>
        // 使用Nginx代理后，可以使用相对路径避免跨域问题
        // 开发环境: 'http://localhost:8080/api/cart'
        // 生产环境(Nginx): '/api/cart'
        const API_BASE = '/api/cart';
        
        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(data, null, 2);
            element.className = 'result ' + (isError ? 'error' : 'success');
        }
        
        async function addToCart() {
            const userId = document.getElementById('addUserId').value;
            const productId = document.getElementById('addProductId').value;
            const quantity = document.getElementById('addQuantity').value;
            
            try {
                const response = await fetch(`${API_BASE}/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: parseInt(userId),
                        productId: parseInt(productId),
                        quantity: parseInt(quantity)
                    })
                });
                
                const data = await response.json();
                showResult('addResult', data, data.code !== 200);
            } catch (error) {
                showResult('addResult', { error: error.message }, true);
            }
        }
        
        async function getCartItems() {
            const userId = document.getElementById('getUserId').value;
            
            try {
                const response = await fetch(`${API_BASE}?userId=${userId}`);
                const data = await response.json();
                showResult('getResult', data, data.code !== 200);
            } catch (error) {
                showResult('getResult', { error: error.message }, true);
            }
        }
        
        async function updateQuantity() {
            const cartId = document.getElementById('updateCartId').value;
            const quantity = document.getElementById('updateQuantity').value;
            
            if (!cartId) {
                alert('请输入购物车项ID');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        cartId: parseInt(cartId),
                        quantity: parseInt(quantity)
                    })
                });
                
                const data = await response.json();
                showResult('updateResult', data, data.code !== 200);
            } catch (error) {
                showResult('updateResult', { error: error.message }, true);
            }
        }
        
        async function removeFromCart() {
            const cartId = document.getElementById('deleteCartId').value;
            
            if (!cartId) {
                alert('请输入购物车项ID');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/remove/${cartId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                showResult('deleteResult', data, data.code !== 200);
            } catch (error) {
                showResult('deleteResult', { error: error.message }, true);
            }
        }
        
        async function getCartCount() {
            const userId = document.getElementById('countUserId').value;
            
            try {
                const response = await fetch(`${API_BASE}/count?userId=${userId}`);
                const data = await response.json();
                showResult('countResult', data, data.code !== 200);
            } catch (error) {
                showResult('countResult', { error: error.message }, true);
            }
        }
    </script>
</body>
</html>
