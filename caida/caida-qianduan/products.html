<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="images/caidaLOGO.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="images/caidaLOGO.jpg">
    <title>全部商品 - 财大优选</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .products-page { min-height: calc(100vh - 200px); padding: 24px 0; background: var(--page-bg); }
        .products-layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: start; }

        /* 分类侧边栏 */
        .filter-sidebar { background: var(--card-bg); border-radius: 16px; box-shadow: var(--shadow-soft); padding: 16px 0; position: sticky; top: 20px; }
        .filter-sidebar h3 { font-size: 17px; padding: 8px 20px 14px; border-bottom: 2px solid #f0f0f0; margin-bottom: 8px; color: var(--text-dark); }
        .filter-sidebar a { display: block; padding: 10px 20px; font-size: 14px; color: var(--text-normal); transition: all 0.2s; border-left: 3px solid transparent; cursor: pointer; }
        .filter-sidebar a:hover, .filter-sidebar a.active { color: var(--main-red); background: #fff5f5; border-left-color: var(--main-red); font-weight: 500; }
        .filter-sidebar a .count { float: right; color: #aaa; font-size: 12px; }

        /* 主区域 */
        .products-main { min-width: 0; }
        .products-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
        .products-toolbar h2 { font-size: 24px; color: var(--text-dark); padding-left: 14px; position: relative; }
        .products-toolbar h2::before { content: ""; position: absolute; left: 0; top: 6px; width: 5px; height: 22px; border-radius: 4px; background: var(--main-red); }
        .search-box { display: flex; border: 2px solid #e0e0e0; border-radius: 24px; overflow: hidden; background: #fff; transition: border-color 0.3s; }
        .search-box:focus-within { border-color: var(--main-red); }
        .search-box input { border: none; outline: none; padding: 9px 16px; font-size: 14px; width: 180px; }
        .search-box button { border: none; background: var(--main-red); color: #fff; padding: 9px 16px; cursor: pointer; font-size: 14px; }

        /* 商品网格 */
        .goods-grid-full { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .goods-card { background: var(--card-bg); border-radius: 16px; box-shadow: var(--shadow-soft); padding: 16px; transition: all 0.3s; display: flex; flex-direction: column; }
        .goods-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
        .goods-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; background: #fafafa; }
        .goods-card h3 { margin-top: 12px; font-size: 16px; color: var(--text-dark); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .goods-card .desc { margin-top: 6px; font-size: 13px; color: var(--text-light); min-height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .goods-card .price { margin-top: 8px; color: #e53935; font-size: 20px; font-weight: bold; }
        .goods-card .add-to-cart-btn { width: 100%; margin-top: 10px; padding: 10px; background: linear-gradient(90deg, var(--main-red), var(--light-red)); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .goods-card .add-to-cart-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(183,28,28,0.3); }

        .empty-state { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
        .result-info { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }

        @media (max-width: 1100px) { .goods-grid-full { grid-template-columns: repeat(5, 1fr); } }
        @media (max-width: 900px) { .goods-grid-full { grid-template-columns: repeat(4, 1fr); gap: 8px; } }
        @media (max-width: 768px) {
            .products-layout { grid-template-columns: 1fr; }
            .filter-sidebar { position: static; display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; }
            .filter-sidebar h3 { width: 100%; border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
            .filter-sidebar a { border-left: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; }
            .filter-sidebar a.active { background: var(--main-red); color: #fff; }
            .goods-grid-full { grid-template-columns: repeat(4, 1fr); gap: 6px; }
        }
        @media (max-width: 480px) { .goods-grid-full { grid-template-columns: repeat(4, 1fr); gap: 4px; } }
        @media (max-width: 600px) {
            .goods-card { padding: 5px; border-radius: 8px; }
            .goods-card img { height: 75px; border-radius: 6px; }
            .goods-card h3 { font-size: 11px; margin-top: 4px; }
            .goods-card .desc { font-size: 10px; min-height: 0; margin-top: 2px; }
            .goods-card .price { font-size: 13px; margin-top: 3px; }
            .goods-card .add-to-cart-btn { padding: 4px; font-size: 10px; margin-top: 4px; border-radius: 4px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="wrapper topbar-inner">
            <p>欢迎来到财大优选</p>
            <ul class="top-links" id="topLinks">
                <li><a href="login.html">登录</a></li>
                <li><a href="register.html">注册</a></li>
                <li><a href="orders.html">我的订单</a></li>
                <li><a href="profile.html">个人中心</a></li>
                <li><a href="help.html">帮助中心</a></li>
            </ul>
        </div>
    </div>

    <header class="header">
        <div class="wrapper" style="display:flex;align-items:center;justify-content:space-between;width:100%;">
            <div class="logo-area">
                <a href="index.html"><img src="images/caidaLOGO.jpg" alt="logo"></a>
                <div class="site-text"><h1>财大优选</h1><p>校园品质生活购物平台</p></div>
            </div>
            <nav class="main-nav" style="margin:0;">
                <a href="index.html">首页</a>
                <a href="products.html" style="opacity:1;font-weight:600;">全部商品</a>
                <a href="orders.html">我的订单</a>
                <a href="profile.html">个人中心</a>
            </nav>
            <a href="#" class="cart-btn" id="cartBtn" style="flex-shrink:0;margin-left:16px;">🛒 购物车<span id="cartCount" style="background:#ff4757;color:#fff;border-radius:50%;padding:2px 7px;font-size:12px;margin-left:6px;display:none;">0</span></a>
        </div>
    </header>

    <div class="products-page">
        <div class="wrapper">
            <div class="products-layout">
                <!-- 侧边栏分类 -->
                <aside class="filter-sidebar" id="filterSidebar">
                    <h3>商品分类</h3>
                    <a class="active" data-cat="all">全部<span class="count" id="countAll">0</span></a>
                </aside>

                <!-- 商品区 -->
                <div class="products-main">
                    <div class="products-toolbar">
                        <h2 id="sectionTitle">全部商品</h2>
                        <div style="display:flex;gap:10px;align-items:center;">
                            <select id="sortSelect" onchange="applyFilter()" style="padding:8px 12px;border:2px solid #e0e0e0;border-radius:20px;font-size:13px;outline:none;cursor:pointer;">
                                <option value="default">默认排序</option>
                                <option value="price_asc">价格从低到高</option>
                                <option value="price_desc">价格从高到低</option>
                                <option value="newest">最新商品</option>
                            </select>
                            <div class="search-box">
                                <input type="text" id="searchInput" placeholder="搜索商品..." onkeyup="if(event.key==='Enter')applyFilter()">
                                <button onclick="applyFilter()">🔍</button>
                            </div>
                        </div>
                    </div>
                    <div class="result-info" id="resultInfo"></div>
                    <div class="goods-grid-full" id="productGrid">
                        <div class="empty-state"><p>正在加载商品...</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="wrapper footer-inner">
            <div><h3>财大优选</h3><p>云南财经大学网页设计课程网页作品</p></div>
            <div><h3>服务支持</h3><p>帮助中心 / 售后服务 / 物流说明</p></div>
            <div><h3>管理功能</h3><p>商品管理 / 订单管理</p></div>
            <div><h3>联系信息</h3><p>仅用于课程展示，无真实商业用途</p></div>
        </div>
        <p class="copyright">Copyright © 财大优选 All Rights Reserved</p>
    </footer>

    <button id="backTop" type="button" aria-label="回到顶部">↑</button>

    <!-- 购物车遮罩层 -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <!-- 购物车侧边栏 -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>购物车 (<span id="cartItemCount">0</span>)</h2>
            <button class="cart-close" id="cartClose">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>购物车是空的</p></div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>总计：</span>
                <span class="total-price" id="totalPrice">￥0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">去结算</button>
        </div>
    </div>

    <script>
        const userInfo = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
        const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');
        const API_BASE_URL = '/api';
        const CURRENT_USER_ID = parseInt(userId) || 0;

        // 顶部导航
        if (userInfo && userId) {
            const user = JSON.parse(userInfo);
            const isAdmin = user.role === 1;
            document.getElementById('topLinks').innerHTML = `
                <li><span>欢迎，${user.username}${isAdmin?' [管理员]':''}</span></li>
                <li><a href="#" id="logoutBtn">退出</a></li>
                <li><a href="orders.html">我的订单</a></li>
                <li><a href="profile.html">个人中心</a></li>
                <li><a href="help.html">帮助中心</a></li>
                ${isAdmin?'<li><a href="product-manage.html">商品管理</a></li><li><a href="order-manage.html">订单管理</a></li>':''}
            `;
            document.getElementById('logoutBtn').addEventListener('click',function(e){e.preventDefault();localStorage.clear();sessionStorage.clear();location.href='login.html';});
        }

        let allProducts = [];
        let currentCat = 'all';

        async function loadAll() {
            try {
                const r = await fetch(`${API_BASE_URL}/admin/products`);
                const j = await r.json();
                allProducts = (j.code===200&&j.data) ? j.data.filter(p=>p.status===1) : [];
            } catch(e) { allProducts = []; }
            buildCategoryNav();

            // 读取 URL 参数，自动跳转到对应分类
            const params = new URLSearchParams(window.location.search);
            const catParam = params.get('cat');
            if (catParam) {
                const target = document.querySelector(`#filterSidebar a[data-cat="${catParam}"]`);
                if (target) {
                    selectCat(catParam, target);
                    return;
                }
            }
            applyFilter();
        }

        function buildCategoryNav() {
            const cats = {};
            allProducts.forEach(p => { const c = p.category||'其他'; cats[c] = (cats[c]||0)+1; });
            const sidebar = document.getElementById('filterSidebar');
            const total = allProducts.length;
            // 推荐商品 = 原始5件（id 1-5）
            const recCount = allProducts.filter(p => [1,2,3,4,5].includes(p.id)).length;
            document.getElementById('countAll').textContent = total;

            let html = '<h3>商品分类</h3><a class="active" data-cat="all" onclick="selectCat(\'all\',this)">全部<span class="count">'+total+'</span></a>';
            html += `<a data-cat="推荐商品" onclick="selectCat('推荐商品',this)" style="color:#e53935;font-weight:500;">⭐ 推荐商品<span class="count">${recCount}</span></a>`;
            Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat, cnt]) => {
                html += `<a data-cat="${cat}" onclick="selectCat('${cat}',this)">${cat}<span class="count">${cnt}</span></a>`;
            });
            sidebar.innerHTML = html;
        }

        function selectCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('#filterSidebar a').forEach(a=>a.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('sectionTitle').textContent = cat==='all'?'全部商品':cat;
            applyFilter();
        }

        function applyFilter() {
            const kw = document.getElementById('searchInput').value.trim().toLowerCase();
            let list = allProducts;
            if (currentCat === '推荐商品') {
                list = list.filter(p => [1,2,3,4,5].includes(p.id));
            } else if (currentCat !== 'all') {
                list = list.filter(p => p.category === currentCat);
            }
            if (kw) list = list.filter(p => p.name.toLowerCase().includes(kw) || (p.description||'').toLowerCase().includes(kw));

            // ===== 排序 =====
            const sortBy = document.getElementById('sortSelect').value;
            if (sortBy === 'price_asc') list.sort((a,b) => (a.price||0) - (b.price||0));
            else if (sortBy === 'price_desc') list.sort((a,b) => (b.price||0) - (a.price||0));
            else if (sortBy === 'newest') list.sort((a,b) => (b.id||0) - (a.id||0));

            document.getElementById('resultInfo').textContent = `共 ${list.length} 件商品`;
            const grid = document.getElementById('productGrid');

            if (!list.length) {
                grid.innerHTML = '<div class="empty-state"><p style="font-size:48px;opacity:0.3;margin-bottom:12px;">📦</p><p>没有找到匹配的商品</p></div>';
                return;
            }

            grid.innerHTML = list.map(p => `
                <article class="goods-card" data-id="${p.id}">
                    <img src="${p.imageUrl||'images/goods01.png'}" alt="${p.name}" onerror="this.src='images/goods01.png'">
                    <h3>${p.name}</h3>
                    <p class="desc">${p.description||''}</p>
                    <p class="price">￥${(p.price||0).toFixed(2)}</p>
                    <button class="add-to-cart-btn">加入购物车</button>
                </article>
            `).join('');

            grid.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (!userInfo) { showToast('请先登录'); return; }
                    const productId = parseInt(this.closest('.goods-card').dataset.id);
                    try {
                        const r = await fetch(`${API_BASE_URL}/cart/add`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:CURRENT_USER_ID,productId,quantity:1})});
                        const j = await r.json();
                        showToast(j.code===200?'已添加到购物车！':(j.message||'添加失败'));
                    } catch(e) { showToast('网络错误'); }
                });
            });
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
            setTimeout(()=>t.classList.add('show'),10);
            setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2000);
        }

        // =========================
        // 购物车功能
        // =========================
        const cartBtn = document.getElementById('cartBtn');
        const cartSidebar = document.getElementById('cartSidebar');
        const cartClose = document.getElementById('cartClose');
        const cartOverlay = document.getElementById('cartOverlay');
        const cartCount = document.getElementById('cartCount');

        cartBtn.addEventListener('click', function(e) { e.preventDefault(); openCart(); });
        cartClose.addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        function openCart() {
            cartSidebar.classList.add('active');
            cartOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            loadCartFromServer();
        }
        function closeCart() {
            cartSidebar.classList.remove('active');
            cartOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        async function loadCartFromServer() {
            try {
                const r = await fetch(`${API_BASE_URL}/cart?userId=${CURRENT_USER_ID}`);
                const j = await r.json();
                if (j.code === 200) renderCart(j.data);
            } catch(e) {}
        }

        async function updateCartCountFromServer() {
            try {
                const r = await fetch(`${API_BASE_URL}/cart/count?userId=${CURRENT_USER_ID}`);
                const j = await r.json();
                if (j.code === 200 && cartCount) {
                    const cnt = j.data.count || 0;
                    cartCount.textContent = cnt;
                    cartCount.style.display = cnt > 0 ? 'inline-block' : 'none';
                }
            } catch(e) {}
        }

        async function removeFromCart(cartId) {
            try {
                const r = await fetch(`${API_BASE_URL}/cart/remove/${cartId}`, { method: 'DELETE' });
                const j = await r.json();
                if (j.code === 200) { showToast('已移除'); loadCartFromServer(); updateCartCountFromServer(); }
            } catch(e) { showToast('网络错误'); }
        }

        async function updateQuantity(cartId, change) {
            const el = document.querySelector(`.cart-item[data-id="${cartId}"]`);
            if (!el) return;
            const cur = parseInt(el.querySelector('.quantity-display').textContent);
            const nq = cur + change;
            if (nq <= 0) { removeFromCart(cartId); return; }
            try {
                const r = await fetch(`${API_BASE_URL}/cart/update`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cartId, quantity: nq })
                });
                const j = await r.json();
                if (j.code === 200) { loadCartFromServer(); updateCartCountFromServer(); }
            } catch(e) { showToast('网络错误'); }
        }

        function renderCart(cartList) {
            const el = document.getElementById('cartItems');
            const tp = document.getElementById('totalPrice');
            const cic = document.getElementById('cartItemCount');
            if (!cartList || cartList.length === 0) {
                el.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>购物车是空的</p></div>';
                if (tp) tp.textContent = '￥0.00';
                if (cic) cic.textContent = '0';
                if (cartCount) { cartCount.textContent = '0'; cartCount.style.display = 'none'; }
                return;
            }
            el.innerHTML = cartList.map(item => `
                <div class="cart-item" data-id="${item.id}">
                    <img src="${item.productImage}" alt="${item.productName}" class="cart-item-image">
                    <div class="cart-item-info">
                        <div><div class="cart-item-name">${item.productName}</div>
                        <div class="cart-item-price">￥${item.productPrice.toFixed(2)}</div></div>
                        <div class="cart-item-controls">
                            <button class="quantity-btn dec" data-id="${item.id}">-</button>
                            <span class="quantity-display">${item.quantity}</span>
                            <button class="quantity-btn inc" data-id="${item.id}">+</button>
                            <button class="remove-item" data-id="${item.id}">&times;</button>
                        </div>
                    </div>
                </div>`).join('');
            el.querySelectorAll('.dec').forEach(b => b.addEventListener('click', () => updateQuantity(parseInt(b.dataset.id), -1)));
            el.querySelectorAll('.inc').forEach(b => b.addEventListener('click', () => updateQuantity(parseInt(b.dataset.id), 1)));
            el.querySelectorAll('.remove-item').forEach(b => b.addEventListener('click', () => removeFromCart(parseInt(b.dataset.id))));
            const total = cartList.reduce((s, item) => s + parseFloat(item.totalPrice), 0);
            if (tp) tp.textContent = '￥' + total.toFixed(2);
            const cnt = cartList.length;
            if (cic) cic.textContent = cnt;
            if (cartCount) { cartCount.textContent = cnt; cartCount.style.display = cnt > 0 ? 'inline-block' : 'none'; }
        }

        document.getElementById('checkoutBtn').addEventListener('click', async function() {
            if (!userInfo) { showToast('请先登录'); return; }
            try {
                const cr = await fetch(`${API_BASE_URL}/cart?userId=${CURRENT_USER_ID}`);
                const cj = await cr.json();
                if (cj.code !== 200 || !cj.data || cj.data.length === 0) { showToast('购物车是空的！'); return; }
                const cor = await fetch(`${API_BASE_URL}/order/checkout`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: CURRENT_USER_ID })
                });
                const coj = await cor.json();
                if (coj.code === 200) {
                    const amt = coj.data.totalAmount ? parseFloat(coj.data.totalAmount).toFixed(2) : '0.00';
                    showToast(`支付成功！订单总额：￥${amt}`);
                    setTimeout(() => { loadCartFromServer(); updateCartCountFromServer(); }, 500);
                } else { showToast(coj.message || '结算失败'); }
            } catch(e) { showToast('网络错误'); }
        });

        updateCartCountFromServer();

        const btt = document.getElementById('backTop');
        if(btt){window.addEventListener('scroll',()=>btt.style.display=window.scrollY>300?'block':'none');btt.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));}

        loadAll();
    </script>
    <script src="ai-chat.js"></script>
</body>
</html>
